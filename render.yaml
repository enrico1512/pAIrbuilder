# Configurazione deploy Render per pAIrbuilder
# Vedi https://render.com/docs/blueprint-spec
#
# Render legge questo file quando colleghi il repo come "Blueprint":
# crea automaticamente il Web Service con i comandi corretti.

services:
  - type: web
    name: pairbuilder
    runtime: node
    plan: free                # piano gratuito (sostituibile con "starter" a 7$/mese se si vuole evitare lo sleep)
    region: frankfurt         # data center più vicino all'Italia
    branch: main              # deploy automatico a ogni push su main
    autoDeploy: true

    buildCommand: npm install && npm run build
    startCommand: npm start

    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      # PORT viene iniettata automaticamente da Render, non serve impostarla.
      # Tutte le seguenti variabili vanno configurate nella dashboard Render
      # (Environment → Add Environment Variable). Le elenco qui senza valore
      # così la dashboard mostra subito quali mancano.
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: SESSION_SECRET
        sync: false
      - key: BCRYPT_ROUNDS
        value: "12"
      # AI gateway aziendale BIBI Srl. Se settata, copre tutti i provider
      # (Anthropic, OpenAI, Gemini) via OpenRouter. Modalita' consigliata
      # in produzione: una sola fattura, una sola dashboard.
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        sync: false
      # Chiavi provider diretti — usate SOLO se OPENROUTER_API_KEY non e'
      # settata (fallback di emergenza / dev locale con account personali).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_VISION_API_KEY
        sync: false
      - key: APP_URL
        sync: false
      # Email transazionali (Resend) — login verify, password reset, ecc.
      # Se mancanti, server NON fallisce ma cade su dev-fallback (token via
      # console.log) → email NON inviate. Vedi audit security 28 mag 2026.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      # Cloudflare Turnstile (captcha anti-bot) su register/forgot/reset.
      # Se mancanti, server NON fallisce ma SALTA la verifica captcha →
      # endpoint sensibili aperti ai bot. Vedi audit security 28 mag 2026.
      - key: TURNSTILE_SITE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
